<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#12121a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle accent orbs -->
  <circle cx="950" cy="150" r="200" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="200" cy="500" r="180" fill="#ec4899" opacity="0.05"/>
  <!-- Top accent bar -->
  <rect x="80" y="80" width="60" height="4" rx="2" fill="url(#accent)"/>
  <!-- Name -->
  <text x="80" y="160" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="64" font-weight="800" fill="#e4e4ef">Dylan</text>
  <!-- Title -->
  <text x="80" y="215" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="26" font-weight="600" fill="#8b5cf6">Full-Stack Developer</text>
  <!-- Tagline -->
  <text x="80" y="280" font-family="'Inter','Segoe UI',system-ui,sans-serif" font-size="22" font-weight="400" fill="#8888a4">I build full-stack apps, AI tools, and real businesses.</text>
  <!-- Divider -->
  <rect x="80" y="320" width="400" height="1" fill="#8888a4" opacity="0.2"/>
  <!-- Tech tags -->
  <rect x="80" y="355" width="90" height="32" rx="6" fill="#8b5cf6" opacity="0.12"/>
  <text x="125" y="376" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">TypeScript</text>
  <rect x="182" y="355" width="64" height="32" rx="6" fill="#8b5cf6" opacity="0.12"/>
  <text x="214" y="376" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">Rust</text>
  <rect x="258" y="355" width="72" height="32" rx="6" fill="#8b5cf6" opacity="0.12"/>
  <text x="294" y="376" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">Python</text>
  <rect x="342" y="355" width="64" height="32" rx="6" fill="#8b5cf6" opacity="0.12"/>
  <text x="374" y="376" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">React</text>
  <rect x="418" y="355" width="62" height="32" rx="6" fill="#8b5cf6" opacity="0.12"/>
  <text x="449" y="376" font-family="'Inter',sans-serif" font-size="13" font-weight="600" fill="#8b5cf6" text-anchor="middle">Tauri</text>
  <!-- Stats -->
  <text x="80" y="450" font-family="'Inter',sans-serif" font-size="42" font-weight="800" fill="url(#accent)">15</text>
  <text x="80" y="475" font-family="'Inter',sans-serif" font-size="14" font-weight="500" fill="#8888a4">Projects</text>
  <text x="200" y="450" font-family="'Inter',sans-serif" font-size="42" font-weight="800" fill="url(#accent2)">4</text>
  <text x="200" y="475" font-family="'Inter',sans-serif" font-size="14" font-weight="500" fill="#8888a4">Languages</text>
  <text x="300" y="450" font-family="'Inter',sans-serif" font-size="42" font-weight="800" fill="url(#accent)">15+</text>
  <text x="300" y="475" font-family="'Inter',sans-serif" font-size="14" font-weight="500" fill="#8888a4">Technologies</text>
  <!-- URL -->
  <text x="80" y="570" font-family="'Inter',sans-serif" font-size="16" font-weight="500" fill="#8888a4">dylmlank.github.io/portfolio</text>
  <!-- Bottom accent bar -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
